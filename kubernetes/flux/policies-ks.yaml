# Wave 3: policy tiers land once the namespaces they police exist.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: policies
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/policies
  prune: false # migration: disarm GC before this ks is replaced by system/ per-component ks
  dependsOn:
    - name: networking
  sourceRef:
    kind: GitRepository
    name: flux-system
