# Wave 1: CRD providers before consumers (Gateway API CRDs incl. TLSRoute
# ship with Envoy Gateway; cert-manager CRDs with its chart).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/flux/infra
  prune: true
  wait: true # HelmReleases must be Ready before dependents start
  sourceRef:
    kind: GitRepository
    name: flux-system
