apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dns01
spec:
  acme:
    # CHECKME: swap for https://acme-staging-v02.api.letsencrypt.org/directory while testing
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@cloudlab.example # CHECKME
    privateKeySecretRef:
      name: letsencrypt-dns01-account
    solvers:
      - dns01:
          # CHECKME: this assumes Cloudflare DNS; swap the solver for your
          # provider. The token secret is applied manually in README Stage 4
          # from cloudflare-token.sops.yaml.example (never plaintext in Git).
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
