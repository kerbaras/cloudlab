# The edge: one Gateway, one public IPv4, three listeners (ARCHITECTURE.md L4).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: edge
  namespace: edge
spec:
  gatewayClassName: edge
  listeners:
    # :80 — permanent 301 (redirect.yaml is the only route allowed here)
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    # :443 — TLS termination for *.cloudlab.example; attachment is opt-in via
    # namespace label (two-key launch)
    - name: https
      port: 443
      protocol: HTTPS
      hostname: "*.cloudlab.example"
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-cloudlab-example-tls
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              cloudlab.example/gateway-access: "true"
    # :6443 — TLS passthrough, SNI-routed to workload-cluster apiservers.
    # The NLB-for-control-planes; TLSRoutes arrive with Phase 3 clusters.
    - name: controlplanes
      port: 6443
      protocol: TLS
      hostname: "*.k8s.cloudlab.example"
      tls:
        mode: Passthrough
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              cloudlab.example/gateway-access: "true"
        kinds:
          - kind: TLSRoute
