# LB-IPAM pools = the Elastic-IP plane (SUBNET-PLAN.md §1/§2.2).
# Public addressing is pool membership, decided by labels in Git — invariants
# 2 and 3 of the security model.
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: edge-ipv4
spec:
  blocks:
    - cidr: 65.21.143.224/32 # the one-address v4 prison
  serviceSelector:
    matchLabels:
      cloudlab.kerbaras.com/lb-pool: edge-ipv4
---
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: public-ipv6
spec:
  blocks:
    # mgmt LB pool (fd02 = cluster 0, role 2); starts at ::1 to skip the
    # subnet-router anycast address (::0), which parts of the internet
    # special-case or drop.
    - start: 2a01:4f9:3b:fd02::1
      stop: 2a01:4f9:3b:fd02::ffff
  serviceSelector:
    matchLabels:
      cloudlab.kerbaras.com/public-v6: "true"
