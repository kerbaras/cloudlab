# Wildcard for the :443 listener. *.k8s.cloudlab.kerbaras.com needs no cert here:
# :6443 is passthrough — workload clusters present their own.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-cloudlab-kerbaras-com
  namespace: edge
spec:
  secretName: wildcard-cloudlab-kerbaras-com-tls
  issuerRef:
    name: letsencrypt-dns01
    kind: ClusterIssuer
  dnsNames:
    - "*.cloudlab.kerbaras.com"
    - cloudlab.kerbaras.com
