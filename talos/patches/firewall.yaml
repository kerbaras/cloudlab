# Talos ingress firewall (ARCHITECTURE.md §6.2, host-destined plane).
# Deliberately NO 80/443/6443-edge rules: LB traffic is intercepted by Cilium
# eBPF upstream of nftables — rules here would be dead code implying coverage.
#
# Management endpoints (apid :50000, apiserver :6443) are internet-open by
# decision #14: both are mutually-authenticated TLS, the operator egress IP is
# dynamic, and IP allowlisting is delegated to the Hetzner Robot firewall
# (editable from any browser — no lockout risk).
apiVersion: v1alpha1
kind: NetworkDefaultActionConfig
ingress: block
---
apiVersion: v1alpha1
kind: NetworkRuleConfig
name: 10-tailscale-direct
portSelector:
  ports:
    - 41641
  protocol: udp
ingress:
  - subnet: 0.0.0.0/0
  - subnet: ::/0
---
apiVersion: v1alpha1
kind: NetworkRuleConfig
name: 20-apid
portSelector:
  ports:
    - 50000
  protocol: tcp
ingress:
  - subnet: 0.0.0.0/0 # mTLS; Robot firewall narrows (decision #14)
  - subnet: ::/0
---
apiVersion: v1alpha1
kind: NetworkRuleConfig
name: 21-kubeapi
portSelector:
  ports:
    - 6443
  protocol: tcp
ingress:
  - subnet: 0.0.0.0/0 # TLS + authn; Robot firewall narrows (decision #14)
  - subnet: ::/0
---
# Cluster-internal: pods reaching host services (kubelet 10250, cilium health
# 4240, hubble 4244/4245, …). Pods are policed by Cilium identity policy;
# this plane only decides that cluster ranges may knock on host ports at all.
apiVersion: v1alpha1
kind: NetworkRuleConfig
name: 30-cluster-internal
portSelector:
  ports:
    - 1-65535
  protocol: tcp
ingress:
  - subnet: 10.244.0.0/16
  - subnet: 2a01:4f9:3b:fd01::/64
---
apiVersion: v1alpha1
kind: NetworkRuleConfig
name: 31-cluster-internal-udp
portSelector:
  ports:
    - 1-65535
  protocol: udp
ingress:
  - subnet: 10.244.0.0/16
  - subnet: 2a01:4f9:3b:fd01::/64
