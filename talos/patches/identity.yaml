# IRSA-at-home (ARCHITECTURE.md L6 flow 3): the cluster's SA issuer becomes a
# public OIDC provider at oidc.cloudlab.kerbaras.com (served by
# system/identity).
# CAUTION: this extraArg REPLACES the default issuer — existing SA tokens go
# Unauthorized (Cilium first, then everything). Changing it costs a full
# pod-restart wave: cilium ds first, then every deployment.
cluster:
  apiServer:
    extraArgs:
      service-account-issuer: https://oidc.cloudlab.kerbaras.com
      service-account-jwks-uri: https://oidc.cloudlab.kerbaras.com/openid/v1/jwks
      # Humans → cluster via Zitadel (L6 flow 1): the "kubernetes" native app
      # (device-code + authcode PKCE). A Zitadel Action flattens project roles
      # into the groups claim; RBAC binds oidc:admin → cluster-admin
      # (system/identity/rbac.yaml). Changing these flags only restarts the
      # apiserver — no SA-token wave (unlike the issuer above).
      oidc-issuer-url: https://auth.cloudlab.kerbaras.com
      oidc-client-id: "381423189042987010"
      oidc-username-claim: email
      oidc-username-prefix: "oidc:"
      oidc-groups-claim: groups
      oidc-groups-prefix: "oidc:"
