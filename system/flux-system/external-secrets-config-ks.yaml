apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-config
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  path: ./system/external-secrets/config
  prune: true
  wait: true
  dependsOn:
    - name: external-secrets # the CRDs + controller
    - name: openbao # the backend the store points at
  sourceRef:
    kind: GitRepository
    name: flux-system
