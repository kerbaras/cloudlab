# The public edge (ARCHITECTURE.md L4): Gateway + wildcard cert + redirect in
# the edge namespace. Depends on every CRD/controller it consumes.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: edge
  namespace: flux-system
spec:
  interval: 10m
  path: ./system/edge
  prune: true
  wait: true
  dependsOn:
    - name: cilium
    - name: cert-manager
    - name: envoy-gateway-system
  decryption:
    provider: sops
    secretRef:
      name: sops-kms
  sourceRef:
    kind: GitRepository
    name: flux-system
