# Observability plane: VictoriaMetrics k8s stack + VictoriaLogs + Alloy.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: monitoring
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  timeout: 15m
  path: ./system/monitoring
  prune: true
  wait: true
  dependsOn:
    - name: openebs # PVCs for vmsingle / victoria-logs / grafana
    - name: edge # grafana HTTPRoute attaches to the gateway
    - name: external-secrets-config # gateway-oidc arrives from bao via ESO
  sourceRef:
    kind: GitRepository
    name: flux-system
