# Cilium's GitOps-owned slice: the LB-IPAM pools (Elastic-IP plane). The Helm
# layer itself stays bootstrap-installed from system/cilium/values.yaml
# (README Stage 3) — that file is deliberately absent from the kustomization.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cilium
  namespace: flux-system
spec:
  interval: 10m
  path: ./system/cilium
  prune: true
  wait: true
  decryption:
    provider: sops # KMS via kustomize-controller's web identity (no secretRef)
  sourceRef:
    kind: GitRepository
    name: flux-system
