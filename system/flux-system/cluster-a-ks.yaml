# cluster-a (Phase 3): the first workload cluster. wait is off on purpose:
# provisioning takes tens of minutes (image imports + Talos bootstrap) and
# health-gating the ks on it just blocks every subsequent apply — the CAPI
# CRs' status is where provisioning progress lives.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-a
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  timeout: 5m
  path: ./clusters/cluster-a
  prune: true
  wait: false
  dependsOn:
    - name: capi # the provider quartet
    - name: cdi # DataVolume imports
    - name: edge # the TLSRoute's Gateway
  decryption:
    provider: sops # KMS via kustomize-controller's web identity (no secretRef)
  sourceRef:
    kind: GitRepository
    name: flux-system
