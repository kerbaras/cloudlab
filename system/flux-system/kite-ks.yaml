apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kite
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  path: ./apps/kite
  prune: true
  wait: true
  dependsOn:
    - name: openebs # sqlite PVC on lvm-thin
    - name: edge # the Gateway the route attaches to
  decryption:
    provider: sops # KMS via kustomize-controller's web identity (no secretRef)
  sourceRef:
    kind: GitRepository
    name: flux-system
