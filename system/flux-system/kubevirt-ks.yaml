# KubeVirt (L1 compute). First install: the KubeVirt CR apply fails until
# virt-operator registers the CRD (~30s) — retryInterval converges it; the
# full virt-* rollout takes a few minutes, hence the generous timeout.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kubevirt
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  timeout: 10m
  path: ./system/kubevirt
  prune: true
  wait: true
  decryption:
    provider: sops # KMS via kustomize-controller's web identity (no secretRef)
  sourceRef:
    kind: GitRepository
    name: flux-system
