apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: forgejo
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  timeout: 15m
  path: ./apps/forgejo
  prune: true
  wait: true
  dependsOn:
    - name: cloudnative-pg # Cluster CRD + operator
    - name: openebs # repo + runner-cache PVCs on lvm-thin
    - name: edge
    - name: external-secrets-config # secrets arrive from bao via ESO
  sourceRef:
    kind: GitRepository
    name: flux-system
