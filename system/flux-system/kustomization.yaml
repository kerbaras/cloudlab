apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - gotk-components.yaml
  - gotk-sync.yaml
  - webhook-token.sops.yaml
  - receiver.yaml
  - cilium-ks.yaml
  - multus-ks.yaml
  - kubevirt-ks.yaml
  - cdi-ks.yaml
  - capi-ks.yaml
  - cert-manager-ks.yaml
  - envoy-gateway-system-ks.yaml
  - edge-ks.yaml
  - openebs-ks.yaml
  - kyverno-ks.yaml
  - identity-ks.yaml
  - external-dns-ks.yaml
  - monitoring-ks.yaml
  - cloudnative-pg-ks.yaml
  - zitadel-ks.yaml
  - homepage-ks.yaml
  - tailscale-ks.yaml
  - openbao-ks.yaml
  - kite-ks.yaml
  - forgejo-ks.yaml
  - zot-ks.yaml
  - ntfy-ks.yaml
  - n8n-ks.yaml
  # workload clusters parked to reclaim RAM — manifests live on in clusters/;
  # re-add cluster-a-ks.yaml / scratch-ks.yaml to stamp them back out
  # (prune deleted the VM root disks: re-enabling means a fresh bootstrap)
patches:
  # the flux-system namespace hosts the webhook HTTPRoute → key 1 of the
  # two-key launch
  - patch: |
      apiVersion: v1
      kind: Namespace
      metadata:
        name: flux-system
        labels:
          cloudlab.kerbaras.com/gateway-access: "true"
  # IRSA-at-home for SOPS-KMS decryption: kustomize-controller assumes
  # cloudlab-flux-sops via web identity (no static key). This is an explicit
  # patch rather than the Kyverno injection so a cold rebuild works before
  # Kyverno exists. Break-glass for cold rebuilds: the OIDC URL is only
  # servable after the edge is up — see README Stage 4.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: kustomize-controller
        namespace: flux-system
      spec:
        template:
          spec:
            containers:
              - name: manager
                env:
                  - name: AWS_ROLE_ARN
                    value: arn:aws:iam::203447569320:role/cloudlab-flux-sops
                  - name: AWS_WEB_IDENTITY_TOKEN_FILE
                    value: /var/run/secrets/eks.amazonaws.com/serviceaccount/token
                  - name: AWS_REGION
                    value: us-east-1
                volumeMounts:
                  - name: aws-iam-token
                    mountPath: /var/run/secrets/eks.amazonaws.com/serviceaccount
                    readOnly: true
            volumes:
              - name: aws-iam-token
                projected:
                  sources:
                    - serviceAccountToken:
                        audience: sts.amazonaws.com
                        expirationSeconds: 86400
                        path: token
