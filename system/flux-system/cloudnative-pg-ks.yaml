apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudnative-pg
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  path: ./system/cloudnative-pg
  prune: true
  wait: true
  dependsOn:
    - name: openebs # PG data lives on lvm-thin
  decryption:
    provider: sops # KMS via kustomize-controller's web identity (no secretRef)
  sourceRef:
    kind: GitRepository
    name: flux-system
