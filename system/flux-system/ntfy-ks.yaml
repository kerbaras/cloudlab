apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ntfy
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  path: ./apps/ntfy
  prune: true
  wait: true
  dependsOn:
    - name: openebs # cache/auth/attachments PVC on lvm-thin
    - name: edge
  decryption:
    provider: sops # KMS via kustomize-controller's web identity (no secretRef)
  sourceRef:
    kind: GitRepository
    name: flux-system
