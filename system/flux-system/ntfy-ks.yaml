apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ntfy
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  path: ./apps/ntfy
  prune: true
  wait: true
  dependsOn:
    - name: openebs # cache/auth/attachments PVC on lvm-thin
    - name: edge
    - name: external-secrets-config # secrets arrive from bao via ESO
  sourceRef:
    kind: GitRepository
    name: flux-system
