apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kyverno
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  path: ./system/kyverno
  prune: true
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-kms
  sourceRef:
    kind: GitRepository
    name: flux-system
