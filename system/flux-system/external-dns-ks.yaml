# dependsOn identity: needs the Kyverno pod-identity policy at pod-create
# time (and, transitively, the Gateway API CRDs its sources watch).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-dns
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  path: ./system/external-dns
  prune: true
  wait: true
  dependsOn:
    - name: identity
  decryption:
    provider: sops # KMS via kustomize-controller's web identity (no secretRef)
  sourceRef:
    kind: GitRepository
    name: flux-system
