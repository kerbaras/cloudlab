# scratch: the vCluster lane (Phase 3).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: scratch
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  path: ./clusters/scratch
  prune: true
  wait: true
  dependsOn:
    - name: openebs # SQLite PVC on lvm-thin
    - name: edge # the TLSRoute's Gateway
  decryption:
    provider: sops # KMS via kustomize-controller's web identity (no secretRef)
  sourceRef:
    kind: GitRepository
    name: flux-system
