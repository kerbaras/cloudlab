# Storage: OpenEBS LocalPV-LVM + snapshot controller + default StorageClass.
# First-install note: VolumeSnapshotClass needs the vendored CRDs — same ks,
# Flux applies CRDs first.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openebs
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  path: ./system/openebs
  prune: true
  wait: true
  decryption:
    provider: sops # KMS via kustomize-controller's web identity (no secretRef)
  sourceRef:
    kind: GitRepository
    name: flux-system
