# Multus meta-CNI (Phase 2). No dependsOn: the primary CNI is bootstrap-
# installed, and the daemon self-orders via readinessindicatorfile (it won't
# write 00-multus.conf until Cilium's conflist exists).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: multus
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  path: ./system/multus
  prune: true
  wait: true
  decryption:
    provider: sops # KMS via kustomize-controller's web identity (no secretRef)
  sourceRef:
    kind: GitRepository
    name: flux-system
