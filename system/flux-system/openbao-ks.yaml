apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openbao
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  path: ./apps/openbao
  prune: true
  wait: true
  dependsOn:
    - name: openebs # raft PVC on lvm-thin
    - name: identity # Kyverno pod-identity injection for the awskms seal
  decryption:
    provider: sops # KMS via kustomize-controller's web identity (no secretRef)
  sourceRef:
    kind: GitRepository
    name: flux-system
