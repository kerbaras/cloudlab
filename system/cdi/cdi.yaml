# CDI (ARCHITECTURE.md L1, Phase 3): image imports to PVCs — the AMI intake.
# Upstream CR trimmed to what this cluster needs; scratch space lands on
# lvm-thin like everything else (§9).
apiVersion: cdi.kubevirt.io/v1beta1
kind: CDI
metadata:
  name: cdi
spec:
  config:
    featureGates:
      - HonorWaitForFirstConsumer # lvm-thin binds WaitForFirstConsumer; don't force-bind scratch
      - WebhookPvcRendering
    scratchSpaceStorageClass: lvm-thin
  imagePullPolicy: IfNotPresent
# Convention, not config: lvm-localpv is unknown to CDI's provisioner table,
# so the lvm-thin StorageProfile is empty and can't fill in PVC blanks.
# A declared StorageProfile can't live here either — its CRD is registered
# by the operator this ks applies, and the stage dry-run deadlocks on the
# missing kind. So DataVolumes spell it out instead: pvc.accessModes
# [ReadWriteOnce] + volumeMode Filesystem, always (see clusters/).
