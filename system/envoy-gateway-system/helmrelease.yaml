apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: envoy-gateway-system
  install:
    createNamespace: true
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: gateway-helm
      version: v1.8.2
      sourceRef:
        kind: HelmRepository
        name: envoyproxy
        namespace: flux-system
  values:
    deployment:
      envoyGateway:
        # control plane for one Gateway: idles ~1m/76Mi (chart says 100m/256Mi)
        resources:
          requests:
            cpu: 10m
            memory: 96Mi
          limits:
            cpu: 200m
            memory: 192Mi
