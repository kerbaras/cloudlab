apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: edge-proxy
  namespace: envoy-gateway-system
spec:
  ipFamily: DualStack # bind :: not 0.0.0.0 — without this the v6 VIP dies at the socket
  # Edge request traces → Alloy's OTLP intake → VictoriaTraces. 100% sampling
  # is fine at lab traffic volumes. Cross-ns backendRef is granted by the
  # ReferenceGrant in system/monitoring.
  telemetry:
    tracing:
      samplingRate: 100
      provider:
        type: OpenTelemetry
        backendRefs:
          - name: alloy
            namespace: monitoring
            port: 4317
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        type: LoadBalancer
        externalTrafficPolicy: Local # preserve client IPs through Cilium KPR
        labels:
          # Labels select the LB-IPAM pools (lb-pools.yaml): .224 + one fd02:: address
          cloudlab.kerbaras.com/lb-pool: edge-ipv4
          cloudlab.kerbaras.com/public-v6: "true"
        patch:
          type: StrategicMerge
          value:
            spec:
              ipFamilyPolicy: PreferDualStack
      envoyDeployment:
        replicas: 1
        # lab traffic: the edge proxy idles ~5m/90Mi against a 100m/512Mi
        # default request. Limits leave burst room for real traffic.
        container:
          resources:
            requests:
              cpu: 10m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 256Mi
        # shutdown-manager has no first-class resources knob — and its 32Mi
        # default request sits under its observed 89Mi working set
        patch:
          type: StrategicMerge
          value:
            spec:
              template:
                spec:
                  containers:
                    - name: shutdown-manager
                      resources:
                        requests:
                          cpu: 5m
                          memory: 96Mi
                        limits:
                          cpu: 100m
                          memory: 128Mi
