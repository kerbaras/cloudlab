# Kyverno: the cluster policy engine. First job: pod-identity injection —
# mutating pods whose SA carries eks.amazonaws.com/role-arn (the IRSA-at-home
# webhook, see policies/aws-pod-identity.yaml).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: kyverno
  install:
    createNamespace: true
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: kyverno
      version: 3.8.2
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
  values:
    # right-sized from observed usage (mean / mean+3σ) — lab budget
    admissionController:
      replicas: 1
      container:
        resources:
          requests:
            cpu: 10m
            memory: 160Mi
          limits:
            cpu: 200m
            memory: 256Mi
    backgroundController:
      replicas: 1
      resources:
        requests:
          cpu: 5m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
    cleanupController:
      replicas: 1
      resources:
        requests:
          cpu: 5m
          memory: 128Mi
        limits:
          cpu: 100m
          memory: 192Mi
    reportsController:
      replicas: 1
      resources:
        requests:
          cpu: 5m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
