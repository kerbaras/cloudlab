# The bao-backed store every app's ExternalSecrets reference. Lives in its
# own Flux stage: a CR can't share a Kustomization with the controller that
# registers its CRD (the stage dry-run deadlock, ARCHITECTURE §7).
#
# bao side of the handshake (imperative, like the runner registration —
# rerun after a bao rebuild):
#
#   bao policy write eso-reader - <<'EOF'
#   path "secret/data/*"     { capabilities = ["read"] }
#   path "secret/metadata/*" { capabilities = ["read", "list"] }
#   EOF
#   bao write auth/kubernetes/role/external-secrets \
#     bound_service_account_names=external-secrets \
#     bound_service_account_namespaces=external-secrets \
#     audience=vault token_policies=eso-reader token_ttl=15m
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: openbao
spec:
  provider:
    vault:
      server: http://openbao.openbao.svc.cluster.local:8200
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: external-secrets
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
