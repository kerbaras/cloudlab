# External Secrets Operator (ARCHITECTURE.md L6 flow 3): the consumption path
# for OpenBao custody. Apps declare ExternalSecrets; ESO logs into bao with
# its projected SA token (kubernetes auth, audience "vault") and materializes
# plain Kubernetes Secrets — no static bao credentials anywhere.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: external-secrets
  releaseName: external-secrets # SA name must be "external-secrets" (bao role binding)
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: external-secrets
      version: 2.7.0
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
  values:
    # starting points; right-size from observed usage later
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 192Mi
    webhook:
      resources:
        requests:
          cpu: 5m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 96Mi
    certController:
      resources:
        requests:
          cpu: 5m
          memory: 48Mi
        limits:
          cpu: 100m
          memory: 128Mi
