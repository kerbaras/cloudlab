# lvm-node needs privileged (host /dev, LVM ioctls); Talos PSA default is
# baseline, so the namespace opts in explicitly.
apiVersion: v1
kind: Namespace
metadata:
  name: openebs
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
