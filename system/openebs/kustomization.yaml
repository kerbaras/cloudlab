apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - source.yaml
  - snapshot-crds.yaml
  - snapshot-controller.yaml
  - helmrelease.yaml
  - storageclass.yaml
  - volumesnapshotclass.yaml
patches:
  # single node — one snapshot-controller is plenty
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: snapshot-controller
        namespace: kube-system
      spec:
        replicas: 1
