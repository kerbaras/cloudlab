# OpenEBS LocalPV-LVM (decision #8: LVM thin on the PV pool disk; Longhorn/
# Ceph remain rejected on one node). VG "pvpool" is created once at bootstrap
# — see README storage stage.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lvm-localpv
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: openebs
  chart:
    spec:
      chart: lvm-localpv
      version: 1.9.1
      sourceRef:
        kind: HelmRepository
        name: openebs-lvmlocalpv
        namespace: flux-system
  values:
    lvmController:
      replicas: 1
