# external-dns: Route53 records for the declared surface (ARCHITECTURE.md L4)
# — HTTPRoute/TLSRoute hostnames become A/AAAA + ownership TXT. Born keyless:
# the SA annotation triggers the Kyverno pod-identity injection
# (role cloudlab-external-dns, scoped to the kerbaras.com zone).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: external-dns
  install:
    createNamespace: true
  chart:
    spec:
      chart: external-dns
      version: 1.21.1
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
  values:
    provider:
      name: aws
    sources:
      - gateway-httproute
      - gateway-tlsroute
    domainFilters:
      - cloudlab.kerbaras.com
    extraArgs:
      # records live under cloudlab.* but the hosted zone is the parent
      # kerbaras.com — without this flag zone discovery matches nothing
      - --aws-zone-match-parent
    txtOwnerId: cloudlab-mgmt
    policy: sync
    # right-sized from observed usage (mean / mean+3σ) — lab budget
    resources:
      requests:
        cpu: 5m
        memory: 96Mi
      limits:
        cpu: 100m
        memory: 128Mi
    serviceAccount:
      create: true
      name: external-dns
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::203447569320:role/cloudlab-external-dns
