# RBAC for Zitadel-authenticated humans (apiserver oidc-* flags in
# talos/patches/identity.yaml). Groups arrive as oidc:<project-role>, users
# as oidc:<email> — both bindable; the admin role gets the keys.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: oidc-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: oidc:admin
