# KubeVirt (ARCHITECTURE.md L1, Phase 3): EC2 at home — VMs as CRs. The host
# kernel's KVM does the heavy lifting; virt-launcher pods are first-class
# guests, no nesting. Talos guide settings, minus the multi-node theater:
# no LiveMigration / workloadUpdateStrategy on one node (§ non-goals).
apiVersion: kubevirt.io/v1
kind: KubeVirt
metadata:
  name: kubevirt
  namespace: kubevirt
spec:
  configuration:
    developerConfiguration:
      featureGates:
        - NetworkBindingPlugins # Multus secondary-interface bindings (Phase 2/3 bridges)
    smbios:
      manufacturer: CloudLab
      product: quasar-vm
      sku: cloudlab
  infra:
    replicas: 1 # virt-api/virt-controller default to 2 — one node, one replica (RAM is the scarce resource)
  imagePullPolicy: IfNotPresent
