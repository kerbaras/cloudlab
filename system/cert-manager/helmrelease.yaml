apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: cert-manager
  install:
    createNamespace: true
  chart:
    spec:
      chart: cert-manager
      version: v1.20.3
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
  values:
    crds:
      enabled: true
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::203447569320:role/cloudlab-cert-manager
    # right-sized from observed usage (mean / mean+3σ) — lab budget
    resources:
      requests:
        cpu: 5m
        memory: 96Mi
      limits:
        cpu: 100m
        memory: 128Mi
    webhook:
      resources:
        requests:
          cpu: 5m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 96Mi
    cainjector:
      resources:
        requests:
          cpu: 5m
          memory: 128Mi
        limits:
          cpu: 100m
          memory: 192Mi
