apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dns01
spec:
  acme:
    # CHECKME: swap for https://acme-staging-v02.api.letsencrypt.org/directory while testing
    server: https://acme-v02.api.letsencrypt.org/directory
    email: matias.pierobonm@gmail.com
    privateKeySecretRef:
      name: letsencrypt-dns01-account
    solvers:
      - dns01:
          # Keyless: ambient AssumeRoleWithWebIdentity via the Kyverno
          # pod-identity injection (role cloudlab-cert-manager; SA annotation
          # in helmrelease.yaml). No static credentials anywhere.
          route53:
            region: us-east-1
