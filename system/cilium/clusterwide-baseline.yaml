# The CCNP variant of the baseline tier (ARCHITECTURE.md §6.3, Phase 2):
# deny-world ingress for every endpoint on the cluster, including namespaces
# nobody remembered to give a policies/ dir. Policies are additive, so the
# per-namespace components stay meaningful (strict tiers, explicit allows —
# e.g. the edge's world-ingress CNP still admits 10080/10443/6443), and this
# backstop simply guarantees there is no policy-less namespace.
# baseline-strict stays a per-namespace decision — cluster-wide strict would
# outlaw every cross-namespace flow at once.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: baseline
spec:
  endpointSelector: {}
  ingress:
    - fromEntities:
        - cluster
