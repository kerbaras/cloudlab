# Cluster API operator (ARCHITECTURE.md L3): the EKS control-plane-of-
# control-planes. Providers ride the chart values rather than standalone CRs:
# their CRDs come from this very release, and a colocated CR deadlocks the
# ks stage dry-run (same lesson as system/cdi's StorageProfile). The chart
# renders the same Provider CRs — Git stays the source of truth.
#
# The quartet is pinned on the v1beta1 contract — CACPPT has no v1beta2
# release yet (its PR #244 is the revisit trigger; CABPT's v0.7 alphas don't
# help alone). Core v1.12.x is the last minor all three providers speak.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: capi-operator
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: capi-operator-system
  releaseName: capi-operator
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: cluster-api-operator
      version: 0.27.0
      sourceRef:
        kind: HelmRepository
        name: capi-operator
        namespace: flux-system
  values:
    # deployment blocks pass through to the Provider CRs — controllers idle at
    # 1-2m CPU / 21-36Mi here; upstream's 100m/128Mi requests are fleet-sized.
    resources:
      manager: # the operator's own deployment
        requests:
          cpu: 5m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 96Mi
    core:
      cluster-api:
        namespace: capi-system
        version: v1.12.9
        deployment:
          containers:
            - name: manager
              resources:
                requests: { cpu: 5m, memory: 48Mi }
                limits: { cpu: 100m, memory: 96Mi }
    infrastructure:
      kubevirt:
        namespace: capk-system
        version: v0.11.2
        deployment:
          containers:
            - name: manager
              resources:
                requests: { cpu: 5m, memory: 48Mi }
                limits: { cpu: 100m, memory: 96Mi }
    bootstrap:
      talos:
        namespace: cabpt-system
        version: v0.6.12
        deployment:
          containers:
            - name: manager
              resources:
                requests: { cpu: 5m, memory: 32Mi }
                limits: { cpu: 100m, memory: 64Mi }
        fetchConfig:
          # clusterctl-style provider URL — the path shape matters, spec.version picks the tag
          url: https://github.com/siderolabs/cluster-api-bootstrap-provider-talos/releases/latest/bootstrap-components.yaml
    controlPlane:
      talos:
        namespace: cacppt-system
        version: v0.5.13
        deployment:
          containers:
            - name: manager
              resources:
                requests: { cpu: 5m, memory: 32Mi }
                limits: { cpu: 100m, memory: 64Mi }
        fetchConfig:
          url: https://github.com/siderolabs/cluster-api-control-plane-provider-talos/releases/latest/control-plane-components.yaml
