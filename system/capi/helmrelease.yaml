# Cluster API operator (ARCHITECTURE.md L3): the EKS control-plane-of-
# control-planes. Providers are CRs (providers.yaml), not helm values —
# cloud-as-CRDs applies to the cloud machinery itself.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: capi-operator
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: capi-operator-system
  releaseName: capi-operator
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: cluster-api-operator
      version: 0.27.0
      sourceRef:
        kind: HelmRepository
        name: capi-operator
        namespace: flux-system
