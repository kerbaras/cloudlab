# The provider quartet: CAPI core + KubeVirt infrastructure (capk) + Sidero's
# Talos bootstrap/control-plane pair (CABPT/CACPPT). Versions are pinned on
# the v1beta1 contract — CACPPT has no v1beta2 release yet (its PR #244 is
# the revisit trigger; CABPT's v0.7 alphas don't help alone).
# First install: these CRs fail until the operator chart's CRDs land —
# retryInterval converges.
apiVersion: v1
kind: Namespace
metadata:
  name: capi-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: capk-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: cabpt-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: cacppt-system
---
apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: CoreProvider
metadata:
  name: cluster-api
  namespace: capi-system
spec:
  version: v1.12.9 # last minor whose contract all three providers speak
---
apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: InfrastructureProvider
metadata:
  name: kubevirt
  namespace: capk-system
spec:
  version: v0.11.2
---
apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: BootstrapProvider
metadata:
  name: talos
  namespace: cabpt-system
spec:
  version: v0.6.12
  fetchConfig:
    url: https://github.com/siderolabs/cluster-api-bootstrap-provider-talos/releases
---
apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: ControlPlaneProvider
metadata:
  name: talos
  namespace: cacppt-system
spec:
  version: v0.5.13
  fetchConfig:
    url: https://github.com/siderolabs/cluster-api-control-plane-provider-talos/releases
