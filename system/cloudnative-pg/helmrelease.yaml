# CloudNativePG: the Postgres operator — databases as CRs (Cluster), on
# lvm-thin PVs. First consumer: Zitadel (apps/zitadel).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: cnpg-system
  install:
    createNamespace: true
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: cloudnative-pg
      version: 0.29.0
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: flux-system
  values:
    replicaCount: 1
