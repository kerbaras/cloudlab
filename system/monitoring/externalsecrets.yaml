# Confidential client for gateway-level OIDC (Envoy SecurityPolicy → Zitadel),
# materialized from bao (secret/monitoring/gateway-oidc) by ESO.
# EG expects the exact key name "client-secret".
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gateway-oidc
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: gateway-oidc
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: monitoring/gateway-oidc
