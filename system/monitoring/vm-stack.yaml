# Metrics half of the observability plane (ARCHITECTURE.md §3 "CloudWatch"):
# VM operator + vmsingle + vmagent + vmalert/alertmanager + Grafana +
# kube-state-metrics + node-exporter + community dashboards.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vm
  namespace: flux-system
spec:
  interval: 30m
  timeout: 15m
  targetNamespace: monitoring
  releaseName: vm # helm-controller would otherwise prefix with the namespace, renaming every service
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      version: 0.86.0
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
        namespace: flux-system
  values:
    vmsingle:
      spec:
        retentionPeriod: "30d"
        storage:
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 20Gi
    # Talos runs no kube-proxy (Cilium KPR) and its control-plane components
    # bind localhost — those scrape targets would only produce dead alerts.
    kubeProxy:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeEtcd:
      enabled: false
    # VictoriaTraces: Jaeger-compatible trace store; the chart auto-wires the
    # Grafana Jaeger datasource when enabled. Fed by Alloy's OTLP intake
    # (alloy.yaml) — apps point OTEL_EXPORTER_OTLP_ENDPOINT at alloy:4318.
    vtsingle:
      enabled: true
      spec:
        retentionPeriod: 14d
        storage:
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 10Gi
    # One datasource per signal, standard types only (prometheus / loki /
    # jaeger). The chart's VM(DS)+VL plugin-typed duplicates are disabled;
    # VictoriaTraces stays on the chart default (already jaeger-typed).
    defaultDatasources:
      victoriametrics:
        datasources:
          - name: VictoriaMetrics
            type: prometheus
            access: proxy
            uid: VictoriaMetrics
            isDefault: true
      victorialogs:
        datasources: []
      # override the chart's VT entry to add correlations (the chart still
      # injects the URL): span → logs (by trace id, any namespace) and
      # span → RED metrics (Alloy's spanmetrics connector output).
      victoriatraces:
        datasources:
          - name: VictoriaTraces
            access: proxy
            uid: VictoriaTraces
            type: jaeger
            jsonData:
              tracesToLogsV2:
                datasourceUid: loki-vl
                spanStartTimeShift: "-5m"
                spanEndTimeShift: "5m"
                customQuery: true
                query: '{namespace=~".+"} |~ "${__span.traceId}"'
              tracesToMetrics:
                datasourceUid: VictoriaMetrics
                spanStartTimeShift: "-2m"
                spanEndTimeShift: "2m"
                tags:
                  - key: service.name
                    value: service_name
                queries:
                  - name: Request rate
                    query: sum(rate(traces_span_metrics_calls_total{$__tags}[5m]))
                  - name: Error rate
                    query: sum(rate(traces_span_metrics_calls_total{$__tags, status_code="STATUS_CODE_ERROR"}[5m]))
                  - name: p95 latency
                    query: histogram_quantile(0.95, sum(rate(traces_span_metrics_duration_seconds_bucket{$__tags}[5m])) by (le))
      extra:
        # Loki-type via loki-vl-proxy: Explore + Logs Drilldown, VL behind it
        - name: Loki (VictoriaLogs)
          type: loki
          access: proxy
          uid: loki-vl
          url: http://loki-vl-proxy:3100
    grafana:
      enabled: true
      deploymentStrategy:
        type: Recreate # RWO PV + RollingUpdate deadlocks on a single node
      persistence:
        enabled: true
        size: 2Gi
      # provisioning removal alone doesn't purge rows from Grafana's DB —
      # this cleanup file does (idempotent at every startup)
      datasources:
        cleanup.yaml:
          apiVersion: 1
          deleteDatasources:
            - name: VictoriaMetrics (DS)
              orgId: 1
            - name: VictoriaLogs
              orgId: 1
            - name: victoriametrics-logs-datasource
              orgId: 1
      grafana.ini:
        log:
          level: debug # TEMP: chasing oauth user-sync failure
        server:
          root_url: https://grafana.cloudlab.kerbaras.com
        # Zitadel SSO (decision #17's human half): PKCE public client — no
        # secret exists, so this whole block is safely plaintext in Git.
        auth.generic_oauth:
          enabled: true
          name: Zitadel
          allow_sign_up: true
          client_id: "381413663090737154" # PKCE app in the cloudlab Zitadel project (API-created)
          scopes: openid profile email urn:zitadel:iam:org:project:roles
          auth_url: https://auth.cloudlab.kerbaras.com/oauth/v2/authorize
          token_url: https://auth.cloudlab.kerbaras.com/oauth/v2/token
          api_url: https://auth.cloudlab.kerbaras.com/oidc/v1/userinfo
          use_pkce: true
          email_attribute_path: email
          login_attribute_path: preferred_username
          name_attribute_path: name
          # Zitadel project role "admin" == the admin group: full Grafana
          # admin; everyone else lands as Viewer.
          allow_assign_grafana_admin: true
          role_attribute_path: contains(keys("urn:zitadel:iam:org:project:roles" || `{}`), 'admin') && 'GrafanaAdmin' || 'Viewer'
