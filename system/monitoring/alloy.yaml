# Alloy ships pod logs (via kubelet API — no hostPath tailing) and Kubernetes
# events into VictoriaLogs' Loki-compatible ingest.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: monitoring
  releaseName: alloy
  chart:
    spec:
      chart: alloy
      version: 1.10.1
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    alloy:
      extraPorts:
        - name: otlp-grpc
          port: 4317
          targetPort: 4317
          protocol: TCP
        - name: otlp-http
          port: 4318
          targetPort: 4318
          protocol: TCP
      configMap:
        content: |
          discovery.kubernetes "pods" {
            role = "pod"
          }

          discovery.relabel "pods" {
            targets = discovery.kubernetes.pods.targets
            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              target_label  = "namespace"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_name"]
              target_label  = "pod"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_container_name"]
              target_label  = "container"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
              target_label  = "app"
            }
          }

          loki.source.kubernetes "pods" {
            targets    = discovery.relabel.pods.output
            forward_to = [loki.write.victorialogs.receiver]
          }

          loki.source.kubernetes_events "events" {
            log_format = "json"
            forward_to = [loki.write.victorialogs.receiver]
          }

          loki.write "victorialogs" {
            endpoint {
              url = "http://vlogs-server.monitoring.svc.cluster.local:9428/insert/loki/api/v1/push"
            }
          }

          // Traces: the cluster's OTLP intake (grpc :4317 / http :4318),
          // batched into VictoriaTraces' OTLP endpoint.
          otelcol.receiver.otlp "default" {
            grpc {
              endpoint = "0.0.0.0:4317"
            }
            http {
              endpoint = "0.0.0.0:4318"
            }
            output {
              traces = [otelcol.processor.batch.default.input]
            }
          }

          otelcol.processor.batch "default" {
            output {
              traces = [otelcol.exporter.otlphttp.victoriatraces.input]
            }
          }

          otelcol.exporter.otlphttp "victoriatraces" {
            client {
              endpoint = "http://vtsingle-vm-victoria-metrics-k8s-stack.monitoring.svc.cluster.local:10428/insert/opentelemetry"
            }
          }
