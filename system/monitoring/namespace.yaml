apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    cloudlab.kerbaras.com/gateway-access: "true" # grafana behind the edge
    # node-exporter needs host namespaces/paths/port — Talos PSA default is
    # baseline, so the namespace opts in.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
