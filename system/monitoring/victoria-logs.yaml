# Logs half: VictoriaLogs single-node, fed by Alloy (pod logs + k8s events).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vlogs
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: monitoring
  releaseName: vlogs
  chart:
    spec:
      chart: victoria-logs-single
      version: 0.13.8
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
        namespace: flux-system
  values:
    fullnameOverride: vlogs
    server:
      retentionPeriod: 30d
      persistentVolume:
        enabled: true
        size: 20Gi
