apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: edge
      namespace: edge
      sectionName: https
  hostnames:
    - grafana.cloudlab.kerbaras.com
  rules:
    - backendRefs:
        - name: vm-grafana
          port: 80
