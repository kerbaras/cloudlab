# The VictoriaMetrics family's own UIs (all but VictoriaLogs, which stays
# unlisted — Grafana's Logs Drilldown is the daily door). Same recipe as
# above: route + gateway OIDC; the pods carry app.kubernetes.io/name labels
# that differ from the route names, hence the pod-selectors.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vmui
  namespace: monitoring
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: VictoriaMetrics
    gethomepage.dev/group: Observability
    gethomepage.dev/icon: victoriametrics.png
    gethomepage.dev/description: Metrics query UI (Zitadel SSO)
    gethomepage.dev/href: https://metrics.cloudlab.kerbaras.com/vmui/
    gethomepage.dev/pod-selector: app.kubernetes.io/name=vmsingle
spec:
  parentRefs:
    - name: edge
      namespace: edge
      sectionName: https
  hostnames:
    - metrics.cloudlab.kerbaras.com
  rules:
    - backendRefs:
        - name: vmsingle-vm-victoria-metrics-k8s-stack
          port: 8428
---
