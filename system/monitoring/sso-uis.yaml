# Gateway-level OIDC (ARCHITECTURE.md L6 flow 2, first use): UIs with no
# native auth get Zitadel SSO enforced AT THE EDGE via Envoy SecurityPolicy.
# One confidential client (gateway-oidc.sops.yaml) serves all three hosts.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hubble
  namespace: monitoring
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Hubble
    gethomepage.dev/group: Observability
    gethomepage.dev/icon: cilium.png
    gethomepage.dev/description: Network flows (Zitadel SSO)
    gethomepage.dev/href: https://hubble.cloudlab.kerbaras.com
    # status: homepage's pod check can't cross namespaces (pods live in
    # kube-system, route lives here) — external hides the k8s dot, and the
    # probe goes cluster-internal, never through the OIDC gate
    gethomepage.dev/external: "true"
    gethomepage.dev/siteMonitor: http://hubble-ui.kube-system.svc.cluster.local:80
spec:
  parentRefs:
    - name: edge
      namespace: edge
      sectionName: https
  hostnames:
    - hubble.cloudlab.kerbaras.com
  rules:
    - backendRefs:
        - name: hubble-ui
          namespace: kube-system
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: victorialogs
  namespace: monitoring
  # not on the dashboard (Grafana's Logs Drilldown is the daily door;
  # this stays reachable directly at logs.cloudlab.kerbaras.com)
spec:
  parentRefs:
    - name: edge
      namespace: edge
      sectionName: https
  hostnames:
    - logs.cloudlab.kerbaras.com
  rules:
    - backendRefs:
        - name: vlogs-server
          port: 9428
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: alertmanager
  namespace: monitoring
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Alertmanager
    gethomepage.dev/group: Observability
    gethomepage.dev/icon: alertmanager.png
    gethomepage.dev/description: Alert silencing (Zitadel SSO)
    gethomepage.dev/href: https://alerts.cloudlab.kerbaras.com
    # status: pods carry app.kubernetes.io/name=vmalertmanager, not the route name
    gethomepage.dev/pod-selector: app.kubernetes.io/name=vmalertmanager
spec:
  parentRefs:
    - name: edge
      namespace: edge
      sectionName: https
  hostnames:
    - alerts.cloudlab.kerbaras.com
  rules:
    - backendRefs:
        - name: vmalertmanager-vm-victoria-metrics-k8s-stack
          port: 9093
---
# hubble-ui lives in kube-system; the route above needs this grant
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: monitoring-routes-to-hubble
  namespace: kube-system
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: monitoring
  to:
    - group: ""
      kind: Service
      name: hubble-ui
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: hubble-oidc
  namespace: monitoring
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: hubble
  oidc:
    provider:
      issuer: https://auth.cloudlab.kerbaras.com
    clientID: "381426478920761346"
    clientSecret:
      name: gateway-oidc
    redirectURL: https://hubble.cloudlab.kerbaras.com/oauth2/callback
    logoutPath: /logout
    scopes: [openid, profile, email]
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: victorialogs-oidc
  namespace: monitoring
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: victorialogs
  oidc:
    provider:
      issuer: https://auth.cloudlab.kerbaras.com
    clientID: "381426478920761346"
    clientSecret:
      name: gateway-oidc
    redirectURL: https://logs.cloudlab.kerbaras.com/oauth2/callback
    logoutPath: /logout
    scopes: [openid, profile, email]
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: alertmanager-oidc
  namespace: monitoring
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: alertmanager
  oidc:
    provider:
      issuer: https://auth.cloudlab.kerbaras.com
    clientID: "381426478920761346"
    clientSecret:
      name: gateway-oidc
    redirectURL: https://alerts.cloudlab.kerbaras.com/oauth2/callback
    logoutPath: /logout
    scopes: [openid, profile, email]
