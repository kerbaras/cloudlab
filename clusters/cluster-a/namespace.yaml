# One workload cluster = one namespace = one VPC (ARCHITECTURE.md L3).
# gateway-access is key 1 of the two-key launch for the apiserver TLSRoute;
# key 2 is the edge-admission CNP in policies/.
apiVersion: v1
kind: Namespace
metadata:
  name: cluster-a
  labels:
    cloudlab.kerbaras.com/gateway-access: "true"
