apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: zot
  namespace: zot
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: zot
    gethomepage.dev/group: Platform
    gethomepage.dev/icon: mdi-package-variant-closed
    gethomepage.dev/description: OCI registry (private)
    gethomepage.dev/href: https://registry.cloudlab.kerbaras.com
spec:
  parentRefs:
    - name: edge
      namespace: edge
      sectionName: https
  hostnames:
    - registry.cloudlab.kerbaras.com
  rules:
    - backendRefs:
        - name: zot
          port: 5000
      # blob uploads/pulls easily outlive Envoy's 15s default
      timeouts:
        request: 0s
