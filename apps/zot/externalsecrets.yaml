# zot's runtime secrets, materialized from bao (secret/zot/*) by ESO.
# zot-values lands in flux-system because HelmRelease valuesFrom resolves
# there (the probe authHeader).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zot-htpasswd
  namespace: zot
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: zot-htpasswd
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: zot/htpasswd
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zot-values
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: zot-values
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: zot/values
