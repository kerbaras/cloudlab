# Homepage (gethomepage.dev): the cloudlab hub at home.cloudlab.kerbaras.com.
# Services self-register: any HTTPRoute annotated gethomepage.dev/enabled
# shows up — adding an app to the dashboard is part of shipping the app.
# Groups (= columns, ordered in settings.layout): Projects for real apps
# (personal projects, not harness), Platform, Observability. Theme is
# Catppuccin Mocha via custom-css.yaml.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: homepage
  releaseName: homepage # avoid the <ns>-<name> prefix: service must be "homepage"
  chart:
    spec:
      chart: homepage
      version: 2.1.0
      sourceRef:
        kind: HelmRepository
        name: jameswynn
        namespace: flux-system
  values:
    enableRbac: true
    serviceAccount:
      create: true
      name: homepage
    persistence:
      homepage-custom-css: # same shape the chart uses for its own config files
        enabled: true
        type: custom
        volumeSpec:
          configMap:
            name: homepage-custom-css
        subPath:
          - path: custom.css
            mountPath: /app/config/custom.css
    env:
      - name: HOMEPAGE_ALLOWED_HOSTS
        value: cloudlab.kerbaras.com
    config:
      kubernetes:
        mode: cluster
        gateway: true
      # settingsString (not settings): helm's toYaml sorts map keys, and
      # layout order = column order — Projects must stay first.
      settingsString: |
        title: cloudlab
        theme: dark # pinned: custom.css maps the gray palette to Mocha
        color: gray
        headerStyle: clean
        statusStyle: dot
        layout:
          Projects: # personal apps — gethomepage.dev/group: Projects
            icon: mdi-rocket-launch
          Platform:
            icon: mdi-cloud-outline
          Observability:
            icon: mdi-telescope
      services: [] # suppress the chart's "My First Group" sample services
      widgets:
        # node gauges: /proc in a pod is node-wide on Talos, so cpu/memory
        # are quasar's; disk / is the overlay upperdir → the /var partition
        - resources:
            label: quasar
            expanded: true
            cpu: true
            memory: true
            disk: /
            refresh: 5000
        - search:
            provider: duckduckgo
            target: _blank
        - datetime:
            text_size: xl
            format:
              timeStyle: short
              dateStyle: long
      bookmarks:
        - Operate:
            - Repo:
                - icon: github.png
                  href: https://github.com/kerbaras/cloudlab
            - Hetzner Robot:
                - icon: hetzner.png
                  href: https://robot.hetzner.com
            - Tailscale:
                - icon: tailscale.png
                  href: https://login.tailscale.com/admin
            - AWS Console:
                - icon: aws.png
                  href: https://console.aws.amazon.com
