# Zitadel's database: CNPG Cluster on lvm-thin. CNPG auto-generates the app
# user secret (zitadel-db-app: username/password/uri…); zitadel consumes the
# uri key as its DSN and owns the database — no superuser handout.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: zitadel-db
  namespace: zitadel
spec:
  instances: 1
  # right-sized from observed usage (~6m/130Mi) — lab budget
  resources:
    requests:
      cpu: 10m
      memory: 160Mi
    limits:
      cpu: 500m
      memory: 256Mi
  bootstrap:
    initdb:
      database: zitadel
      owner: zitadel
  storage:
    size: 10Gi
