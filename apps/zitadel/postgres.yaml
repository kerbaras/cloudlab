# Zitadel's database: CNPG Cluster on lvm-thin. CNPG auto-generates the app
# user secret (zitadel-db-app: username/password/uri…); zitadel consumes the
# uri key as its DSN and owns the database — no superuser handout.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: zitadel-db
  namespace: zitadel
spec:
  instances: 1
  bootstrap:
    initdb:
      database: zitadel
      owner: zitadel
  storage:
    size: 10Gi
