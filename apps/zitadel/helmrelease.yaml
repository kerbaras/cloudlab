# Zitadel (ARCHITECTURE.md L6, decision #10): the humans-and-apps IdP.
# TLS terminates at the edge; the API speaks h2c behind it (appProtocol).
# No human superadmin exists: bootstrap is a machine account (iam-admin)
# whose PAT lands in the iam-admin-pat secret (zitadel ns) — the break-glass
# credential. Humans hold IAM_OWNER and sign in with passkeys / external IdP.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zitadel
  namespace: flux-system
spec:
  interval: 30m
  timeout: 15m
  targetNamespace: zitadel
  releaseName: zitadel # avoid the <ns>-<name> prefix: services must be zitadel / zitadel-login
  install:
    remediation:
      retries: 3 # first install races the CNPG cluster coming up
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: zitadel
      version: 10.0.4
      sourceRef:
        kind: HelmRepository
        name: zitadel
        namespace: flux-system
  values:
    zitadel:
      masterkeySecretName: zitadel-masterkey
      configmapConfig:
        ExternalDomain: auth.cloudlab.kerbaras.com
        ExternalPort: 443
        ExternalSecure: true
        TLS:
          Enabled: false
        FirstInstance:
          Org:
            Name: cloudlab
            Machine:
              Machine:
                Username: cloudlab-bootstrap
                Name: cloudlab-bootstrap
              Pat:
                ExpirationDate: "2030-01-01T00:00:00Z"
    # DSN mode (chart-recommended): the CNPG-generated app secret carries the
    # full connection URI — no password duplication, no DB superuser needed
    # (the zitadel user owns its pre-provisioned database). NOTE: top-level
    # `env` — only this propagates into the chart's init/setup jobs.
    env:
      - name: ZITADEL_DATABASE_POSTGRES_DSN
        valueFrom:
          secretKeyRef:
            name: zitadel-db-app
            key: uri
    service:
      appProtocol: kubernetes.io/h2c
    replicaCount: 1
