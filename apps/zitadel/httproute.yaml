apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: zitadel
  namespace: zitadel
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Zitadel
    gethomepage.dev/group: Platform
    gethomepage.dev/icon: zitadel.png
    gethomepage.dev/description: Identity provider (humans & workloads)
    gethomepage.dev/href: https://zitadel.cloudlab.kerbaras.com
spec:
  parentRefs:
    - name: edge
      namespace: edge
      sectionName: https
  hostnames:
    - zitadel.cloudlab.kerbaras.com
  rules:
    # login UI v2 (plain http/1.1)
    - matches:
        - path: { type: PathPrefix, value: /ui/v2/login }
      backendRefs:
        - name: zitadel-login
          port: 3000
    # everything else: the API/console over h2c
    - backendRefs:
        - name: zitadel
          port: 8080
