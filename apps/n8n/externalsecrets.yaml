# n8n's credential-store encryption key, materialized from bao
# (secret/n8n/main) by ESO. The VALUE must never change — rotating it
# orphans every stored credential; bao is where it lives, not a rotation
# lever.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n-secrets
  namespace: n8n
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: n8n-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: n8n/main
