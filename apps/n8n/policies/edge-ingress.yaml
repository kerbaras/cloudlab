# Key 2 of the two-key launch: edge gateway → n8n (editor + webhooks).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-edge-gateway
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: n8n
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: envoy-gateway-system
            gateway.envoyproxy.io/owning-gateway-name: edge
      toPorts:
        - ports:
            - port: "5678"
              protocol: TCP
