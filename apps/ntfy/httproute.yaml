apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ntfy
  namespace: ntfy
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: ntfy
    gethomepage.dev/group: Tools
    gethomepage.dev/icon: ntfy.png
    gethomepage.dev/description: Push notifications
    gethomepage.dev/href: https://ntfy.cloudlab.kerbaras.com
spec:
  parentRefs:
    - name: edge
      namespace: edge
      sectionName: https
  hostnames:
    - ntfy.cloudlab.kerbaras.com
  rules:
    - backendRefs:
        - name: ntfy
          port: 80
      # subscriptions are long-polling/SSE — they must outlive Envoy's 15s default
      timeouts:
        request: 0s
