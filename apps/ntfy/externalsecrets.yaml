# ntfy's provisioned users (user:bcrypt:role + the break-glass password
# reference), materialized from bao (secret/ntfy/users) by ESO.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ntfy-users
  namespace: ntfy
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: ntfy-users
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: ntfy/users
