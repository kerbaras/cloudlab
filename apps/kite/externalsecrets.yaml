# Kite's runtime secrets (JWT/encrypt keys, break-glass superuser, Zitadel
# client secret), materialized from bao (secret/kite/main) by ESO.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kite-secrets
  namespace: kite
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: kite-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: kite/main
