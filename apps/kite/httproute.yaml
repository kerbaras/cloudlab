# No gateway OIDC SecurityPolicy on purpose: Kite brings its own authn
# (Zitadel OAuth via config-file mode) and needs websockets for logs/terminal.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kite
  namespace: kite
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Kite
    gethomepage.dev/group: Platform
    gethomepage.dev/icon: kubernetes-dashboard.png
    gethomepage.dev/description: Cluster console (Zitadel SSO)
    gethomepage.dev/href: https://kite.cloudlab.kerbaras.com
spec:
  parentRefs:
    - name: edge
      namespace: edge
      sectionName: https
  hostnames:
    - kite.cloudlab.kerbaras.com
  rules:
    - backendRefs:
        - name: kite
          port: 8080
