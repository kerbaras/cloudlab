# Forgejo's runtime secrets, materialized from bao (secret/forgejo/*) by ESO.
# Custody moved from sops-in-git per decision #15's endgame; the pre-migration
# values remain recoverable from git history + KMS.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-admin
  namespace: forgejo
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: forgejo-admin
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: forgejo/admin
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-oauth
  namespace: forgejo
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: forgejo-oauth
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: forgejo/oauth
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-runner-connection
  namespace: forgejo
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: forgejo-runner-connection
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: forgejo/runner
