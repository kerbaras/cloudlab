apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: forgejo
  namespace: forgejo
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Forgejo
    gethomepage.dev/group: Platform
    gethomepage.dev/icon: forgejo.png
    gethomepage.dev/description: Git forge + Actions CI
    gethomepage.dev/href: https://git.cloudlab.kerbaras.com
spec:
  parentRefs:
    - name: edge
      namespace: edge
      sectionName: https
  hostnames:
    - git.cloudlab.kerbaras.com
  rules:
    - backendRefs:
        - name: forgejo-http
          port: 3000
      # big clones/pushes and actions log streaming outlive Envoy's 15s default
      timeouts:
        request: 0s
