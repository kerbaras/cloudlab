# Forgejo Actions runner: offline (shared-secret) registration — the
# IaC-native flow. The runner's uuid+token live in bao (secret/forgejo/runner,
# ESO-materialized) and derive from a 40-hex shared secret; the server side of
# the handshake is one imperative command after each forgejo bootstrap
# (idempotent):
#
#   kubectl -n forgejo exec deploy/forgejo -- \
#     forgejo forgejo-cli actions register --name cloudlab-runner \
#       --labels docker,ubuntu-latest --secret <token from runner-connection>
#
# Jobs run as containers in the privileged dind sidecar (no docker on Talos
# hosts, and workloads never touch the host runtime). Layer cache rides a PVC
# so CI image builds stay warm across restarts.
apiVersion: v1
kind: ConfigMap
metadata:
  name: forgejo-runner-config
  namespace: forgejo
data:
  # the init container appends the server.connections block from the
  # ESO-materialized secret — everything reviewable stays here in git
  config.yml: |
    log:
      level: info
    runner:
      capacity: 2
      timeout: 1h
      labels:
        - docker:docker://node:22-bookworm
        - ubuntu-latest:docker://ghcr.io/catthehacker/ubuntu:act-22.04
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forgejo-runner-docker
  namespace: forgejo
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-runner
  namespace: forgejo
spec:
  replicas: 1
  strategy:
    type: Recreate # the docker-cache PVC is RWO
  selector:
    matchLabels:
      app.kubernetes.io/name: forgejo-runner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forgejo-runner
    spec:
      initContainers:
        - name: render-config
          image: code.forgejo.org/forgejo/runner:12.12.0
          command:
            - sh
            - -c
            - |
              cp /config/config.yml /gen/config.yml
              cat >>/gen/config.yml <<EOF

              server:
                connections:
                  forgejo:
                    url: http://forgejo-http:3000/
                    uuid: ${RUNNER_UUID}
                    token: ${RUNNER_TOKEN}
              EOF
          env:
            - name: RUNNER_UUID
              valueFrom:
                secretKeyRef: { name: forgejo-runner-connection, key: uuid }
            - name: RUNNER_TOKEN
              valueFrom:
                secretKeyRef: { name: forgejo-runner-connection, key: token }
          volumeMounts:
            - name: config
              mountPath: /config
            - name: rendered-config
              mountPath: /gen
      containers:
        - name: runner
          image: code.forgejo.org/forgejo/runner:12.12.0
          # retry loop covers the bootstrap window before the server-side
          # `actions register` has been run (see header comment)
          command:
            - sh
            - -c
            - |
              while ! forgejo-runner --config /gen/config.yml daemon; do
                echo "daemon exited — retrying in 30s (runner registered on the server yet?)"
                sleep 30
              done
          env:
            - name: DOCKER_HOST
              value: tcp://localhost:2376
            - name: DOCKER_CERT_PATH
              value: /certs/client
            - name: DOCKER_TLS_VERIFY
              value: "1"
          volumeMounts:
            - name: rendered-config
              mountPath: /gen
            - name: docker-certs
              mountPath: /certs
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
        - name: dind
          image: docker:29.6.1-dind
          securityContext:
            privileged: true # kvm-grade isolation is a non-goal here; jobs stay in this pod's sidecar
          env:
            - name: DOCKER_TLS_CERTDIR
              value: /certs
          volumeMounts:
            - name: docker-certs
              mountPath: /certs
            - name: docker-data
              mountPath: /var/lib/docker
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: config
          configMap:
            name: forgejo-runner-config
        - name: rendered-config
          emptyDir: {}
        - name: docker-certs
          emptyDir: {}
        - name: docker-data
          persistentVolumeClaim:
            claimName: forgejo-runner-docker
